apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm
  namespace: llm
  labels:
    app: llm
spec:
  selector:
    matchLabels:
      app: llm
  template:
    metadata:
      labels:
        app: llm
    spec:
      containers:
        - name: llm
          image: ghcr.io/ggml-org/llama.cpp:server-cuda
          imagePullPolicy: IfNotPresent
          args:
            - -m
            - /models/Qwen3.6-35B-A3B-GGUF/Qwen3.6-35B-A3B-Q4_K_M.gguf
            - --port
            - "8080"
            - --host
            - "0.0.0.0"
            - -c
            - "262144"
            - --n-gpu-layers
            - "-1"
            - --embedding
          env:
            - name: LLAMA_HTTP_CORS_ORIGIN
              value: "*"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: models
              mountPath: /models
          securityContext:
            runAsUser: 0
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: hizuru
      volumes:
        - name: models
          hostPath:
            path: /mnt/data/models
            type: DirectoryOrCreate
