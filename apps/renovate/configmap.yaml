# Reference Renovate configuration — not deployed by Helm.
# Each instance's actual ConfigMap is generated from .Values.instances.<name>.configJson.
apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-github-config
  namespace: renovate
data:
  config.json: |
    {
      "platform": "github",
      "autodiscover": false,
      "repositories": [],
      "gitAuthor": "Renovate Bot <renovate@renovate.invalid>",
      "rebaseWhen": "conflicted",
      "timezone": "Europe/Berlin"
    }

