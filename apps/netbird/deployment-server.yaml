apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-server
  namespace: netbird
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: netbird-server
  template:
    metadata:
      labels:
        app: netbird-server
    spec:
      containers:
        - name: netbird-server
          image: docker.io/netbirdio/netbird-server:0.75.0
          args:
            - --config
            - /etc/netbird/config.yaml
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: stun
              containerPort: 3478
              hostPort: 3478
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/netbird/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /var/lib/netbird
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config
          secret:
            secretName: netbird-config
        - name: data
          persistentVolumeClaim:
            claimName: netbird-data
