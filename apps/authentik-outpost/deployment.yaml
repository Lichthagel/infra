apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: hizuru
    app.kubernetes.io/name: authentik-outpost
  name: authentik-outpost
  namespace: authentik-outpost
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: hizuru
      app.kubernetes.io/name: authentik-outpost
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: hizuru
        app.kubernetes.io/name: authentik-outpost
    spec:
      containers:
        - image: ghcr.io/goauthentik/proxy:2026.2.1
          name: proxy
          ports:
            - containerPort: 9000
              name: http
              protocol: TCP
            - containerPort: 9443
              name: https
              protocol: TCP
          envFrom:
            - secretRef:
                name: authentik-outpost-api
