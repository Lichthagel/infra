apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sumireko-traefik
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/Lichthagel/infra
    path: apps/traefik
    targetRevision: HEAD
    helm:
      parameters:
        - name: traefik.providers.kubernetesCRD.allowExternalNameServices
          value: "true"
        - name: traefik.providers.kubernetesIngress.allowExternalNameServices
          value: "true"
  destination:
    server: {{ .Values.cluster.address }}
    namespace: traefik
